name: test-vnstock
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install vnstock
        run: pip install --quiet vnstock
      - name: Probe vnstock from GitHub IP
        run: python .github/probe_vnstock.py

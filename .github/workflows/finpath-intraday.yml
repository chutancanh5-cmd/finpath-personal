name: finpath-intraday
# Quet trong phien: moi 5' tu 02:00-08:55 UTC = 09:00-15:55 gio VN, T2-T6.
# App doc data qua raw.githubusercontent nen khong vuong gioi han build Pages.
on:
  schedule:
    - cron: '2-57/5 2-8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finpath-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ACCEPT_TC: "tĂ´i Ä‘á»“ng Ă½"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run intraday updaters
        working-directory: updater
        run: |
          python update_prices.py --light || true
          python scan_intraday.py --discord || true
          python update_orderflow.py --discord || true
          python update_news.py || true
          python check_alerts.py || true
      - name: Commit & push data
        run: |
          git config user.name "finpath-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then echo "khong co thay doi"; else
            git commit -m "data: intraday $(date -u +%H:%M) UTC"
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            git push
          fi

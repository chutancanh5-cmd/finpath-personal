name: finpath-tinai
# Tin AI hang ngay: RSS -> Claude (thue bao, CLAUDE_CODE_OAUTH_TOKEN) -> ai_digest.json + news.json.
# 00:53 UTC = 07:53 gio VN. Thieu token -> chi cap nhat tin, bo qua AI.
on:
  schedule:
    - cron: '53 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finpath-data
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Ho_Chi_Minh
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Dump RSS tho
        run: python updater/update_news.py --rawdump
      - name: AI digest (Claude thue bao)
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "Chua co CLAUDE_CODE_OAUTH_TOKEN -> bo qua AI, giu digest cu"
          else
            cat updater/ai_prompt_ci.txt | claude -p --model claude-sonnet-5 --permission-mode acceptEdits || echo "claude loi -> giu digest cu"
          fi
      - name: Merge tin
        run: python updater/update_news.py
      - name: Commit & push
        run: |
          git config user.name "finpath-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/ai_digest.json docs/data/news.json docs/data/_rss_raw.json
          if git diff --cached --quiet; then echo "khong co thay doi"; else
            git commit -m "Tin AI: cloud digest $(date +%F)"
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            git push
          fi
